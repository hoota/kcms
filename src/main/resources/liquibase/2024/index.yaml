databaseChangeLog:
  - changeSet:
      id: first
      author: andrey
      changes:
        - sql:
            sql: >
              SELECT NOW();

  - changeSet:
      id: pages.sql
      author: andrey
      changes:
        - sqlFile:
            splitStatements: false
            relativeToChangelogFile: true
            path: pages.sql

  - changeSet:
      id: page_slug_index
      author: andrey
      changes:
        - sql:
            sql: >
              ALTER TABLE page ADD CONSTRAINT "page_slug" UNIQUE (slug);

  - changeSet:
      id: page_parent_id
      author: andrey
      changes:
        - sql:
            sql: >
              ALTER TABLE page ADD COLUMN IF NOT EXISTS parent_id BIGINT;
              ALTER TABLE page ADD FOREIGN KEY (parent_id) REFERENCES public.page(id) MATCH SIMPLE ON UPDATE CASCADE ON DELETE SET NULL;
              CREATE INDEX "page_parent_id" ON page(parent_id);              
              
  - changeSet:
      id: enum.sql
      author: andrey
      changes:
        - sqlFile:
            splitStatements: false
            relativeToChangelogFile: true
            path: enum.sql

  - changeSet:
      id: file.sql
      author: andrey
      changes:
        - sqlFile:
            splitStatements: false
            relativeToChangelogFile: true
            path: file.sql

  - changeSet:
      id: page_404
      author: andrey
      changes:
        - sql:
            sql: >
              INSERT INTO page VALUES(-404, '/404', 'Page not found', '');

  - changeSet:
      id: page_property_number_numeric
      author: andrey
      changes:
        - sql:
            sql: >
              ALTER TABLE public.page_property ALTER number TYPE numeric;

  - changeSet:
      id: enum__order
      author: andrey
      changes:
        - sql:
            sql: >
              ALTER TABLE public.enum ADD COLUMN IF NOT EXISTS ord INT NOT NULL DEFAULT 0;

  - changeSet:
      id: page__published
      author: andrey
      changes:
        - sql:
            sql: >
              ALTER TABLE public.page ADD COLUMN IF NOT EXISTS published BOOL NOT NULL DEFAULT false;
              UPDATE public.page SET published=true;

  - changeSet:
      id: file__size_symlink
      author: andrey
      changes:
        - sql:
            sql: >
              ALTER TABLE public.file ADD COLUMN IF NOT EXISTS size BIGINT NOT NULL DEFAULT 0, ADD COLUMN IF NOT EXISTS symlink BIGINT;
              ALTER TABLE public.file ADD FOREIGN KEY (symlink) REFERENCES public.file(id) MATCH SIMPLE ON UPDATE CASCADE ON DELETE CASCADE;
              CREATE INDEX "file_symlink" ON file(symlink);

  - changeSet:
      id: big_refactoring
      author: andrey
      changes:
        - sql:
            sql: >
              ALTER TABLE enum RENAME TO kcms_enum;
              ALTER TABLE file RENAME TO kcms_file;
              ALTER TABLE page RENAME TO kcms_page;
              ALTER TABLE page_property RENAME TO kcms_page_property;
              UPDATE kcms_page_property SET property_id = widget_id||'.'||property_id;
              ALTER TABLE kcms_page_property DROP widget_id;
              ALTER TABLE kcms_page_property ADD CONSTRAINT "kcms_page_property_page_id_property_id" PRIMARY KEY (page_id, property_id);
              

  - changeSet:
      id: kcms_file__order
      author: andrey
      changes:
        - sql:
            sql: >
              ALTER TABLE public.kcms_file ADD COLUMN IF NOT EXISTS ord INT NOT NULL DEFAULT 0;
              UPDATE public.kcms_file SET ord = id;

  - changeSet:
      id: kcms_page__order
      author: andrey
      changes:
        - sql:
            sql: >
              ALTER TABLE public.kcms_page ADD COLUMN IF NOT EXISTS ord INT NOT NULL DEFAULT 0;
              UPDATE public.kcms_page SET ord = id;

  - changeSet:
      id: kcms_site_property.sql
      author: andrey
      changes:
        - sqlFile:
            splitStatements: false
            relativeToChangelogFile: true
            path: kcms_site_property.sql

  - changeSet:
      id: kcms_enum_category.sql
      author: andrey
      changes:
        - sqlFile:
            splitStatements: false
            relativeToChangelogFile: true
            path: kcms_enum_category.sql
