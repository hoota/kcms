server:
  port: ${JAV_HTTP_PORT:8080}
  address: 0.0.0.0
  servlet.context-path: /
  compression:
    enabled: false

spring:
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  datasource:
    hikari:
      jdbc-url: ${JAV_DB_URL}
      username: ${JAV_DB_USER}
      password: ${JAV_DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
      maximum-pool-size: ${JAV_DB_POOL_MAX:5}
      minimum-idle: ${JAV_DB_POOL_MIN:1}
      idle-timeout: 60000
      pool-name: ${JAV_DB_POOL:ll-db-pool}
  liquibase:
    change-log: classpath:/liquibase/changelog-master.yaml
    drop-first: false
    enabled: true
    url: ${spring.datasource.hikari.jdbc-url}
    user: ${spring.datasource.hikari.username}
    password: ${spring.datasource.hikari.password}

  # ===============================
  # = JPA / HIBERNATE
  # ===============================
  jpa:
    #    show-sql: true
    properties.hibernate:
      query.plan_cache_max_size: 256
      criteria.literal_handling_mode: bind
      # Disabled exception java.sql.SQLFeatureNotSupportedException:
      # Method org.postgresql.jdbc.PgConnection.createClob() is not yet implemented.
      temp.use_jdbc_metadata_defaults: false
      # Allows Hibernate to generate SQL optimized for a particular DBMS
      dialect: org.hibernate.dialect.PostgreSQL9Dialect
      # Use spring.jpa.properties.* for Hibernate native properties (the prefix is
      # stripped before adding them to the entity manager).
      #        show-sql: true
      ddl-auto: none
      # Naming strategy
      naming-strategy: org.hibernate.cfg.ImprovedNamingStrategy

access-control:
  allow-origin: '*'
  allow-methods: 'POST,GET,DELETE,PUT,OPTIONS'
  allow-headers: 'Content-Type,Authorization'
  allow-credentials: true
